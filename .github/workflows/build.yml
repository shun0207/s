name: Build Fabric Mod

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Apply 26.1.2 overlay-message API fix
        run: |
          sed -i 's/client\.player\.displayClientMessage(Component\.literal(message), true);/client.gui.setOverlayMessage(Component.literal(message), false);/' src/main/java/com/syun/buildassist/BuildAssistClient.java

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          gradle build --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: error

      - name: Upload release JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-assist-client-26.1.2
          path: build/libs/build-assist-client-1.1.0+26.1.2.jar
          if-no-files-found: error
